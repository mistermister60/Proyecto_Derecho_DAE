<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6777ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5ac7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Balanza de la justicia -->
  <g transform="translate(256,260)" fill="white" stroke="white" stroke-width="2">
    <!-- Base de la balanza -->
    <polygon points="0,-80 -120,80 120,80" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/>
    <!-- Brazo horizontal -->
    <line x1="-140" y1="-20" x2="140" y2="-20" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Eje central -->
    <line x1="0" y1="-80" x2="0" y2="-20" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Cadenas izquierda -->
    <line x1="-140" y1="-20" x2="-140" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Plato izquierdo -->
    <ellipse cx="-140" cy="40" rx="45" ry="12" fill="white" opacity="0.95"/>
    <!-- Cadenas derecha -->
    <line x1="140" y1="-20" x2="140" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Plato derecho -->
    <ellipse cx="140" cy="40" rx="45" ry="12" fill="white" opacity="0.95"/>
  </g>
  <!-- Libro/ley en la base -->
  <g transform="translate(256,420)" fill="white">
    <rect x="-40" y="-15" width="80" height="30" rx="4" fill="white" opacity="0.3"/>
    <line x1="-25" y1="-5" x2="25" y2="-5" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-25" y1="5" x2="25" y2="5" stroke="white" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
